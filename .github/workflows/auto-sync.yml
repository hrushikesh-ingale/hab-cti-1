name: Auto-Sync with Upstream

on:
  schedule:
    - cron: '0 * * * *' # Automatically runs at the top of every hour
  workflow_dispatch: # Gives you a button to trigger it manually if you want

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "GitHub Auto-Sync"
          git config user.email "action@github.com"

      - name: Pull and push upstream changes
        run: |
          # Replace the URL below with the original repository's HTTPS URL
          git remote add upstream https://github.com/ganelaaa/hab-cti.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
